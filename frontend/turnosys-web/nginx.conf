server {
    listen ${PORT};
    root /usr/share/nginx/html;
    index index.html;

    # SPA: cualquier ruta cae en index.html (React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy de la API al backend público de Railway (mismo origen → sin CORS)
    location /api/ {
        proxy_pass https://turnosysback.up.railway.app/api/;
        proxy_http_version 1.1;
        proxy_set_header Host turnosysback.up.railway.app;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_server_name on;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
}
